<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Attendance Dashboard</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">
<h1>Attendance Tracker</h1>
</header>

<div class="main-container">

    <!-- LEFT PANEL -->
    <div class="left-panel">

        <h2>Attendance</h2>

        <div class="attendance-circle">
            <span id="attendancePercent">0%</span>
        </div>

        <div class="weight-info">
            <p>Attended Weight: <span id="attendedWeight">0</span></p>
            <p>Total Weight: <span id="totalWeight">0</span></p>
        </div>

    </div>



    <!-- CENTER PANEL -->

    <div class="center-panel">

        <div class="routine-header">

            <h2>Daily Routine</h2>

            <div class="date-selector">
                <label>Select Date</label>
                <button id="prevDay">◀</button>

                <input type="date" id="datePicker">

                <button id="nextDay">▶</button>
            </div>

        </div>

        <table class="routine-table">

            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Weight</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="routineBody">

                <!-- JS will generate rows -->


            </tbody>

        </table>

    </div>



    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <h2>Students</h2>

        <div class="add-student">

            <input
            type="text"
            id="studentName"
            placeholder="Student name">

            <button id="addStudentBtn">
            Add
            </button>

        </div>

        <div class="student-select">

            <label>Select Student</label>

            <select id="studentDropdown">

                <option>Select</option>

            </select>

        </div>

    </div>

</div>



<!-- SUBJECT SUMMARY -->

<div class="summary-section">

<h2>Subject Summary</h2>

<table class="summary-table">

<thead>

<tr>
<th>Subject</th>
<th>Total Classes Weights</th>
<th>Attended Classes Weights</th>
<th>Percentage</th>
</tr>

</thead>

<tbody id="summaryBody">


</tbody>

</table>

</div>



<script src="app.js"></script>

</body>

</html>
